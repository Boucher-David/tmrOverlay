name: Windows .NET

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore tmrOverlay.sln

      - name: Build
        run: dotnet build tmrOverlay.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tmrOverlay.sln --configuration Release --no-build
