name: Windows .NET

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  windows_build_test:
    name: Windows build/test
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore tmrOverlay.sln

      - name: Build
        run: dotnet build tmrOverlay.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tmrOverlay.sln --configuration Release --no-build

  windows_release_package:
    name: Windows release package
    if: startsWith(github.ref, 'refs/tags/v')
    needs: windows_build_test
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore tmrOverlay.sln

      - name: Publish
        run: dotnet publish .\src\TmrOverlay.App\TmrOverlay.App.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o .\artifacts\TmrOverlay-win-x64

      - name: Zip package
        shell: pwsh
        run: Compress-Archive -Path .\artifacts\TmrOverlay-win-x64\* -DestinationPath .\artifacts\TmrOverlay-win-x64.zip -Force

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: TmrOverlay-win-x64
          path: .\artifacts\TmrOverlay-win-x64.zip
