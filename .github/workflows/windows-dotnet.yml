name: Build/Test

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mac_harness_build_test:
    name: macOS harness build/test
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode when available
        run: |
          if [ -d /Applications/Xcode.app/Contents/Developer ]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcode-select -p

      - name: Swift version
        run: swift --version

      - name: Build mac harness
        working-directory: local-mac/TmrOverlayMac
        run: swift build

      - name: Test mac harness
        working-directory: local-mac/TmrOverlayMac
        run: swift test

  windows_build_test:
    name: Windows build/test
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Restore
        run: dotnet restore tmrOverlay.sln

      - name: Build
        run: dotnet build tmrOverlay.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tmrOverlay.sln --configuration Release --no-build

      - name: Validate screenshot artifacts
        run: python tools/validate_overlay_screenshots.py

      - name: Validate release tutorial image
        run: python tools/validate_overlay_screenshots.py --profile release-tutorial --root docs/assets

      - name: Check Windows screenshot expectations
        run: python tools/validate_overlay_screenshots.py --profile windows-expectations

      - name: Generate Windows overlay screenshots
        shell: pwsh
        run: |
          dotnet run `
            --project .\tools\TmrOverlay.WindowsScreenshots\TmrOverlay.WindowsScreenshots.csproj `
            --configuration Release `
            --no-build `
            -- .\artifacts\windows-overlay-screenshots

      - name: Validate Windows overlay screenshots
        run: python tools/validate_overlay_screenshots.py --profile windows-ci --root artifacts/windows-overlay-screenshots

      - name: Upload Windows overlay screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-overlay-screenshots
          path: artifacts/windows-overlay-screenshots
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish dry run
        id: publish_dry_run
        shell: pwsh
        run: |
          [xml]$buildProps = Get-Content .\Directory.Build.props
          $version = $buildProps.Project.PropertyGroup.VersionPrefix
          $fileVersion = "$version.0"
          $informationalVersion = "$version+${{ github.sha }}"
          $publishPath = ".\artifacts\pr-publish-check"
          $manifestPath = ".\artifacts\pr-publish-check-manifest.txt"

          dotnet publish .\src\TmrOverlay.App\TmrOverlay.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=$version `
            -p:AssemblyVersion=$fileVersion `
            -p:FileVersion=$fileVersion `
            -p:InformationalVersion=$informationalVersion `
            -p:ContinuousIntegrationBuild=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o $publishPath

          "publish_path=$publishPath" >> $env:GITHUB_OUTPUT
          "manifest_path=$manifestPath" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "informational_version=$informationalVersion" >> $env:GITHUB_OUTPUT

      - name: Audit dry-run publish output
        shell: pwsh
        run: |
          .\tools\ci\audit-windows-publish.ps1 `
            -PublishPath "${{ steps.publish_dry_run.outputs.publish_path }}" `
            -ManifestPath "${{ steps.publish_dry_run.outputs.manifest_path }}" `
            -PackageName "pr-publish-check" `
            -Version "${{ steps.publish_dry_run.outputs.version }}" `
            -InformationalVersion "${{ steps.publish_dry_run.outputs.informational_version }}"

      - name: Install Velopack CLI
        shell: pwsh
        run: dotnet tool install --global vpk --version 0.0.1298

      - name: Velopack pack dry run
        shell: pwsh
        run: |
          $vpk = Join-Path $env:USERPROFILE ".dotnet\tools\vpk.exe"
          $velopackPath = ".\artifacts\pr-velopack-check"
          New-Item -ItemType Directory -Force -Path $velopackPath | Out-Null

          & $vpk pack `
            --packId "TMROverlay" `
            --packVersion "${{ steps.publish_dry_run.outputs.version }}" `
            --packDir "${{ steps.publish_dry_run.outputs.publish_path }}" `
            --mainExe "TMROverlay.exe" `
            --packTitle "Tech Mates Racing Overlay" `
            --packAuthors "Tech Mates Racing" `
            --outputDir $velopackPath `
            --channel "win-x64" `
            --icon ".\src\TmrOverlay.App\Assets\TmrOverlay.ico"
          if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
          }

          $setup = Get-ChildItem $velopackPath -Filter "*Setup*.exe" | Select-Object -First 1
          $fullPackage = Get-ChildItem $velopackPath -Filter "*${{ steps.publish_dry_run.outputs.version }}*-full.nupkg" | Select-Object -First 1
          $releaseIndex = Join-Path $velopackPath "releases.win-x64.json"
          if ($null -eq $setup -or $null -eq $fullPackage -or !(Test-Path $releaseIndex)) {
              Get-ChildItem $velopackPath | Format-Table Name, Length
              throw "Velopack dry run output is missing the setup executable, full package, or releases.win-x64.json."
          }

  windows_release_package:
    name: Windows release package
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: windows_build_test
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Compute release metadata
        id: release_metadata
        shell: pwsh
        run: |
          $refName = "${{ github.ref_name }}"
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          [xml]$buildProps = Get-Content .\Directory.Build.props
          $branchVersion = $buildProps.Project.PropertyGroup.VersionPrefix
          $isReleaseTag = "${{ github.ref_type }}" -eq "tag" -and $refName -match '^v(?<version>\d+\.\d+\.\d+)$'

          if ($isReleaseTag) {
              $version = $Matches['version']
              $packageLabel = $refName
          } else {
              $version = $branchVersion
              $safeRef = $refName -replace '[^A-Za-z0-9._-]', '-'
              $packageLabel = "$safeRef-${{ github.run_number }}-$shortSha"
          }

          $fileVersion = "$version.0"
          "version=$version" >> $env:GITHUB_OUTPUT
          "file_version=$fileVersion" >> $env:GITHUB_OUTPUT
          "informational_version=$version+${{ github.sha }}" >> $env:GITHUB_OUTPUT
          "package_name=TmrOverlay-$packageLabel-win-x64" >> $env:GITHUB_OUTPUT
          "is_release_tag=$($isReleaseTag.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore tmrOverlay.sln

      - name: Publish
        shell: pwsh
        run: |
          $publishPath = ".\artifacts\${{ steps.release_metadata.outputs.package_name }}"
          dotnet publish .\src\TmrOverlay.App\TmrOverlay.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.release_metadata.outputs.version }} `
            -p:AssemblyVersion=${{ steps.release_metadata.outputs.file_version }} `
            -p:FileVersion=${{ steps.release_metadata.outputs.file_version }} `
            -p:InformationalVersion=${{ steps.release_metadata.outputs.informational_version }} `
            -p:ContinuousIntegrationBuild=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o $publishPath

      - name: Audit publish output
        shell: pwsh
        run: |
          $publishPath = ".\artifacts\${{ steps.release_metadata.outputs.package_name }}"
          $manifestPath = ".\artifacts\${{ steps.release_metadata.outputs.package_name }}-manifest.txt"
          .\tools\ci\audit-windows-publish.ps1 `
            -PublishPath $publishPath `
            -ManifestPath $manifestPath `
            -PackageName "${{ steps.release_metadata.outputs.package_name }}" `
            -Version "${{ steps.release_metadata.outputs.version }}" `
            -InformationalVersion "${{ steps.release_metadata.outputs.informational_version }}"

      - name: Zip package
        shell: pwsh
        run: |
          $publishPath = ".\artifacts\${{ steps.release_metadata.outputs.package_name }}"
          $packagePath = ".\artifacts\${{ steps.release_metadata.outputs.package_name }}.zip"
          Compress-Archive -Path "$publishPath\*" -DestinationPath $packagePath -Force

      - name: Generate checksum
        shell: pwsh
        run: |
          $packagePath = ".\artifacts\${{ steps.release_metadata.outputs.package_name }}.zip"
          $checksumPath = "$packagePath.sha256"
          $hash = (Get-FileHash -Path $packagePath -Algorithm SHA256).Hash.ToLowerInvariant()
          $fileName = Split-Path -Path $packagePath -Leaf
          "$hash  $fileName" | Set-Content -Path $checksumPath -Encoding ascii

      - name: Install Velopack CLI
        shell: pwsh
        run: dotnet tool install --global vpk --version 0.0.1298

      - name: Build Velopack release
        shell: pwsh
        run: |
          $vpk = Join-Path $env:USERPROFILE ".dotnet\tools\vpk.exe"
          $publishPath = ".\artifacts\${{ steps.release_metadata.outputs.package_name }}"
          $velopackPath = ".\artifacts\velopack"
          New-Item -ItemType Directory -Force -Path $velopackPath | Out-Null

          & $vpk download github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token "${{ github.token }}" `
            --outputDir $velopackPath `
            --channel "win-x64"
          if ($LASTEXITCODE -ne 0) {
              Write-Warning "No previous Velopack release was downloaded; continuing without a delta base."
          }

          & $vpk pack `
            --packId "TMROverlay" `
            --packVersion "${{ steps.release_metadata.outputs.version }}" `
            --packDir $publishPath `
            --mainExe "TMROverlay.exe" `
            --packTitle "Tech Mates Racing Overlay" `
            --packAuthors "Tech Mates Racing" `
            --outputDir $velopackPath `
            --channel "win-x64" `
            --icon ".\src\TmrOverlay.App\Assets\TmrOverlay.ico"
          if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
          }

          $setup = Get-ChildItem $velopackPath -Filter "*Setup*.exe" | Select-Object -First 1
          $fullPackage = Get-ChildItem $velopackPath -Filter "*${{ steps.release_metadata.outputs.version }}*-full.nupkg" | Select-Object -First 1
          $releaseIndex = Join-Path $velopackPath "releases.win-x64.json"
          if ($null -eq $setup -or $null -eq $fullPackage -or !(Test-Path $releaseIndex)) {
              Get-ChildItem $velopackPath | Format-Table Name, Length
              throw "Velopack output is missing the setup executable, full package, or releases.win-x64.json."
          }

          $uploadPath = ".\artifacts\velopack-upload"
          New-Item -ItemType Directory -Force -Path $uploadPath | Out-Null
          Copy-Item $setup.FullName -Destination $uploadPath -Force
          Copy-Item $releaseIndex -Destination $uploadPath -Force
          Get-ChildItem $velopackPath -Filter "*${{ steps.release_metadata.outputs.version }}*.nupkg" |
            Copy-Item -Destination $uploadPath -Force
          $uploadPackage = Get-ChildItem $uploadPath -Filter "*${{ steps.release_metadata.outputs.version }}*.nupkg" | Select-Object -First 1
          if ($null -eq $uploadPackage) {
              Get-ChildItem $uploadPath | Format-Table Name, Length
              throw "Velopack upload output is missing the current-version package."
          }

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_metadata.outputs.package_name }}
          path: |
            artifacts/${{ steps.release_metadata.outputs.package_name }}.zip
            artifacts/${{ steps.release_metadata.outputs.package_name }}.zip.sha256
            artifacts/${{ steps.release_metadata.outputs.package_name }}-manifest.txt
            artifacts/velopack-upload/*

      - name: Create GitHub release
        if: steps.release_metadata.outputs.is_release_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/${{ steps.release_metadata.outputs.package_name }}.zip
            artifacts/${{ steps.release_metadata.outputs.package_name }}.zip.sha256
            artifacts/${{ steps.release_metadata.outputs.package_name }}-manifest.txt
            artifacts/velopack-upload/*
