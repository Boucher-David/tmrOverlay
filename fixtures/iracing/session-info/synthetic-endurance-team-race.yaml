  Notes:
    - Top-level iRacing sections mirror fields observed in real captured YAML.
    - SyntheticTelemetryFrames is fixture-only and is not emitted by iRacing session YAML.
    - DriverUserID intentionally differs from the active Drivers entry during teammate stints.
    - CarSetup.Chassis.Rear.FuelLevel is setup fuel, not live fuel remaining.

