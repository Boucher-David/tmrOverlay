<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="1520" viewBox="0 0 1520 1520" role="img" aria-labelledby="title desc">
  <title id="title">Fuel calculator overlay state mocks</title>
  <desc id="desc">Static mock contact sheet showing six representative states for the fuel calculator overlay.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <style>
      .page { fill: #091012; }
      .card { fill: #11191d; stroke: #25333a; stroke-width: 1; rx: 18; }
      .caption { fill: #e7eef2; font-family: "Segoe UI", Arial, sans-serif; font-size: 18px; font-weight: 700; }
      .note { fill: #8fa0aa; font-family: "Segoe UI", Arial, sans-serif; font-size: 12px; }
      .overlay-wait { fill: #0e1215; }
      .overlay-ok { fill: #0e261c; }
      .overlay-warn { fill: #361e0e; }
      .overlay-border { fill: none; stroke: rgba(255,255,255,0.28); stroke-width: 1; }
      .title { fill: #ffffff; font-family: "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 700; }
      .status-wait { fill: #a0a0a0; font-family: Consolas, "Courier New", monospace; font-size: 13px; }
      .status-ok { fill: #70e092; font-family: Consolas, "Courier New", monospace; font-size: 13px; }
      .status-warn { fill: #f6b858; font-family: Consolas, "Courier New", monospace; font-size: 13px; }
      .table-bg { fill: #181e22; stroke: rgba(255,255,255,0.26); stroke-width: 1; }
      .grid { stroke: rgba(255,255,255,0.26); stroke-width: 1; }
      .header { fill: #ffffff; font-family: Consolas, "Courier New", monospace; font-size: 13px; font-weight: 700; }
      .cell { fill: #dae2e6; font-family: Consolas, "Courier New", monospace; font-size: 12px; }
      .source { fill: #809199; font-family: Consolas, "Courier New", monospace; font-size: 11px; }
      .page-title { fill: #f4f8f9; font-family: "Segoe UI", Arial, sans-serif; font-size: 30px; font-weight: 800; }
      .page-subtitle { fill: #9fb0ba; font-family: "Segoe UI", Arial, sans-serif; font-size: 15px; }
    </style>
  </defs>

  <rect class="page" width="1520" height="1520"/>
  <text class="page-title" x="60" y="54">Fuel Calculator v1 States</text>
  <text class="page-subtitle" x="60" y="82">Static overlay mocks for user feedback on wording, density, and strategy guidance.</text>

  <!-- State 1 -->
  <g transform="translate(50 120)">
    <rect class="card" width="680" height="335" filter="url(#shadow)"/>
    <text class="caption" x="24" y="34">1. Waiting for usable fuel</text>
    <text class="note" x="24" y="54">Connected overlay before reliable fuel/lap data is available.</text>
    <g transform="translate(40 72)">
      <rect class="overlay-wait" width="600" height="154"/>
      <rect class="overlay-border" x="0.5" y="0.5" width="599" height="153"/>
      <text class="title" x="14" y="27">Fuel Calculator</text>
      <text class="status-wait" x="586" y="27" text-anchor="end">waiting for fuel</text>
      <rect class="table-bg" x="14" y="42" width="572" height="78"/>
      <line class="grid" x1="151" y1="42" x2="151" y2="120"/>
      <line class="grid" x1="426" y1="42" x2="426" y2="120"/>
      <line class="grid" x1="14" y1="81" x2="586" y2="81"/>
      <text class="header" x="24" y="67">Overview</text>
      <text class="header" x="416" y="67" text-anchor="end">waiting for live fuel</text>
      <text class="header" x="576" y="67" text-anchor="end">Advice</text>
      <text class="cell" x="24" y="107">Stint 1</text>
      <text class="cell" x="416" y="107" text-anchor="end">--</text>
      <text class="cell" x="576" y="107" text-anchor="end">--</text>
      <text class="source" x="14" y="144">burn -- (unavailable) | -- | history none</text>
    </g>
  </g>

  <!-- State 2 -->
  <g transform="translate(790 120)">
    <rect class="card" width="680" height="335" filter="url(#shadow)"/>
    <text class="caption" x="24" y="34">2. Live green-flag strategy</text>
    <text class="note" x="24" y="54">Live burn is available, but exact user history is still sparse.</text>
    <g transform="translate(40 72)">
      <rect class="overlay-warn" width="600" height="320"/>
      <rect class="overlay-border" x="0.5" y="0.5" width="599" height="319"/>
      <text class="title" x="14" y="27">Fuel Calculator</text>
      <text class="status-warn" x="586" y="27" text-anchor="end">8-lap rhythm avoids +1 stop</text>
      <rect class="table-bg" x="14" y="42" width="572" height="244"/>
      <line class="grid" x1="151" y1="42" x2="151" y2="286"/>
      <line class="grid" x1="426" y1="42" x2="426" y2="286"/>
      <line class="grid" x1="14" y1="83" x2="586" y2="83"/>
      <line class="grid" x1="14" y1="124" x2="586" y2="124"/>
      <line class="grid" x1="14" y1="165" x2="586" y2="165"/>
      <line class="grid" x1="14" y1="206" x2="586" y2="206"/>
      <line class="grid" x1="14" y1="247" x2="586" y2="247"/>
      <text class="header" x="24" y="68">Overview</text>
      <text class="header" x="416" y="68" text-anchor="end">30 laps | 4 stints | final 7</text>
      <text class="header" x="576" y="68" text-anchor="end">Advice</text>
      <text class="cell" x="24" y="109">Strategy</text>
      <text class="cell" x="416" y="109" text-anchor="end">8-lap rhythm avoids +1 stop</text>
      <text class="cell" x="576" y="109" text-anchor="end">save 0.1</text>
      <text class="cell" x="24" y="150">Stint 1</text>
      <text class="cell" x="416" y="150" text-anchor="end">8 laps | target 13.3 L/lap</text>
      <text class="cell" x="576" y="150" text-anchor="end">tire data pending</text>
      <text class="cell" x="24" y="191">Stint 2</text>
      <text class="cell" x="416" y="191" text-anchor="end">8 laps | target 13.3 L/lap</text>
      <text class="cell" x="576" y="191" text-anchor="end">tire data pending</text>
      <text class="cell" x="24" y="232">Stint 3</text>
      <text class="cell" x="416" y="232" text-anchor="end">7 laps | target 15.1 L/lap</text>
      <text class="cell" x="576" y="232" text-anchor="end">tire data pending</text>
      <text class="cell" x="24" y="273">Stint 4</text>
      <text class="cell" x="416" y="273" text-anchor="end">7 laps final | target 15.1 L/lap</text>
      <text class="cell" x="576" y="273" text-anchor="end">no tire stop</text>
      <text class="source" x="14" y="310">burn 13.4 L/lap (live burn) | 7.9 laps/tank | history none</text>
    </g>
  </g>

  <!-- State 3 -->
  <g transform="translate(50 490)">
    <rect class="card" width="680" height="335" filter="url(#shadow)"/>
    <text class="caption" x="24" y="34">3. User-history-informed strategy</text>
    <text class="note" x="24" y="54">Exact combo history adds stint shape and tire/refuel timing guidance.</text>
    <g transform="translate(40 72)">
      <rect class="overlay-warn" width="600" height="320"/>
      <rect class="overlay-border" x="0.5" y="0.5" width="599" height="319"/>
      <text class="title" x="14" y="27">Fuel Calculator</text>
      <text class="status-warn" x="586" y="27" text-anchor="end">8-lap rhythm avoids +1 stop (~65s)</text>
      <rect class="table-bg" x="14" y="42" width="572" height="244"/>
      <line class="grid" x1="151" y1="42" x2="151" y2="286"/>
      <line class="grid" x1="426" y1="42" x2="426" y2="286"/>
      <line class="grid" x1="14" y1="83" x2="586" y2="83"/>
      <line class="grid" x1="14" y1="124" x2="586" y2="124"/>
      <line class="grid" x1="14" y1="165" x2="586" y2="165"/>
      <line class="grid" x1="14" y1="206" x2="586" y2="206"/>
      <line class="grid" x1="14" y1="247" x2="586" y2="247"/>
      <text class="header" x="24" y="68">Overview</text>
      <text class="header" x="416" y="68" text-anchor="end">30 laps | 4 stints | final 8</text>
      <text class="header" x="576" y="68" text-anchor="end">Advice</text>
      <text class="cell" x="24" y="109">Strategy</text>
      <text class="cell" x="416" y="109" text-anchor="end">8-lap rhythm avoids +1 stop</text>
      <text class="cell" x="576" y="109" text-anchor="end">~65s | save 0.1</text>
      <text class="cell" x="24" y="150">Stint 1</text>
      <text class="cell" x="416" y="150" text-anchor="end">7 laps | target 15.1 L/lap</text>
      <text class="cell" x="576" y="150" text-anchor="end">tires +4s</text>
      <text class="cell" x="24" y="191">Stint 2</text>
      <text class="cell" x="416" y="191" text-anchor="end">8 laps | target 13.3 L/lap</text>
      <text class="cell" x="576" y="191" text-anchor="end">tires free (106 L)</text>
      <text class="cell" x="24" y="232">Stint 3</text>
      <text class="cell" x="416" y="232" text-anchor="end">7 laps | target 15.1 L/lap</text>
      <text class="cell" x="576" y="232" text-anchor="end">tires +4s</text>
      <text class="cell" x="24" y="273">Stint 4</text>
      <text class="cell" x="416" y="273" text-anchor="end">8 laps final | target 13.3 L/lap</text>
      <text class="cell" x="576" y="273" text-anchor="end">no tire stop</text>
      <text class="source" x="14" y="310">burn 13.4 L/lap (live burn) | 7.9 laps/tank | history user | tires user pit history</text>
    </g>
  </g>

  <!-- State 4 -->
  <g transform="translate(790 490)">
    <rect class="card" width="680" height="335" filter="url(#shadow)"/>
    <text class="caption" x="24" y="34">4. Long race, rolling future window</text>
    <text class="note" x="24" y="54">Completed rows roll off; strategy row stays visible when it matters.</text>
    <g transform="translate(40 72)">
      <rect class="overlay-warn" width="600" height="320"/>
      <rect class="overlay-border" x="0.5" y="0.5" width="599" height="319"/>
      <text class="title" x="14" y="27">Fuel Calculator</text>
      <text class="status-warn" x="586" y="27" text-anchor="end">8-lap rhythm avoids +3 stops (~194s)</text>
      <rect class="table-bg" x="14" y="42" width="572" height="244"/>
      <line class="grid" x1="151" y1="42" x2="151" y2="286"/>
      <line class="grid" x1="426" y1="42" x2="426" y2="286"/>
      <line class="grid" x1="14" y1="83" x2="586" y2="83"/>
      <line class="grid" x1="14" y1="124" x2="586" y2="124"/>
      <line class="grid" x1="14" y1="165" x2="586" y2="165"/>
      <line class="grid" x1="14" y1="206" x2="586" y2="206"/>
      <line class="grid" x1="14" y1="247" x2="586" y2="247"/>
      <text class="header" x="24" y="68">Overview</text>
      <text class="header" x="416" y="68" text-anchor="end">148 laps | 19 stints | final 4</text>
      <text class="header" x="576" y="68" text-anchor="end">Advice</text>
      <text class="cell" x="24" y="109">Strategy</text>
      <text class="cell" x="416" y="109" text-anchor="end">8-lap rhythm avoids +3 stops</text>
      <text class="cell" x="576" y="109" text-anchor="end">~194s | save 0.1</text>
      <text class="cell" x="24" y="150">Stint 5</text>
      <text class="cell" x="416" y="150" text-anchor="end">8 laps | target 13.3 L/lap</text>
      <text class="cell" x="576" y="150" text-anchor="end">tires free (106 L)</text>
      <text class="cell" x="24" y="191">Stint 6</text>
      <text class="cell" x="416" y="191" text-anchor="end">8 laps | target 13.3 L/lap</text>
      <text class="cell" x="576" y="191" text-anchor="end">tires free (106 L)</text>
      <text class="cell" x="24" y="232">Stint 7</text>
      <text class="cell" x="416" y="232" text-anchor="end">8 laps | target 13.3 L/lap</text>
      <text class="cell" x="576" y="232" text-anchor="end">tires free (106 L)</text>
      <text class="cell" x="24" y="273">Stint 8</text>
      <text class="cell" x="416" y="273" text-anchor="end">8 laps | target 13.3 L/lap</text>
      <text class="cell" x="576" y="273" text-anchor="end">tires free (106 L)</text>
      <text class="source" x="14" y="310">burn 13.4 L/lap (live burn) | 7.9 laps/tank | history user | gap O0.2 C0.2</text>
    </g>
  </g>

  <!-- State 5 -->
  <g transform="translate(50 860)">
    <rect class="card" width="680" height="270" filter="url(#shadow)"/>
    <text class="caption" x="24" y="34">5. No-stop compact state</text>
    <text class="note" x="24" y="54">When no fuel stop is needed, the overlay shrinks to one action row.</text>
    <g transform="translate(40 72)">
      <rect class="overlay-ok" width="600" height="154"/>
      <rect class="overlay-border" x="0.5" y="0.5" width="599" height="153"/>
      <text class="title" x="14" y="27">Fuel Calculator</text>
      <text class="status-ok" x="586" y="27" text-anchor="end">fuel covers finish</text>
      <rect class="table-bg" x="14" y="42" width="572" height="78"/>
      <line class="grid" x1="151" y1="42" x2="151" y2="120"/>
      <line class="grid" x1="426" y1="42" x2="426" y2="120"/>
      <line class="grid" x1="14" y1="81" x2="586" y2="81"/>
      <text class="header" x="24" y="67">Overview</text>
      <text class="header" x="416" y="67" text-anchor="end">5 laps | no stop</text>
      <text class="header" x="576" y="67" text-anchor="end">Advice</text>
      <text class="cell" x="24" y="107">Stint 1</text>
      <text class="cell" x="416" y="107" text-anchor="end">no fuel stop needed</text>
      <text class="cell" x="576" y="107" text-anchor="end">no tire stop</text>
      <text class="source" x="14" y="144">burn 10.0 L/lap (live burn) | 10.6 laps/tank | history none</text>
    </g>
  </g>

  <!-- State 6 -->
  <g transform="translate(790 860)">
    <rect class="card" width="680" height="335" filter="url(#shadow)"/>
    <text class="caption" x="24" y="34">6. Spotting/model fallback</text>
    <text class="note" x="24" y="54">Local fuel scalar is missing; team progress plus user history drives planning.</text>
    <g transform="translate(40 72)">
      <rect class="overlay-warn" width="600" height="320"/>
      <rect class="overlay-border" x="0.5" y="0.5" width="599" height="319"/>
      <text class="title" x="14" y="27">Fuel Calculator</text>
      <text class="status-warn" x="586" y="27" text-anchor="end">8-lap rhythm avoids +1 stop (~65s)</text>
      <rect class="table-bg" x="14" y="42" width="572" height="244"/>
      <line class="grid" x1="151" y1="42" x2="151" y2="286"/>
      <line class="grid" x1="426" y1="42" x2="426" y2="286"/>
      <line class="grid" x1="14" y1="83" x2="586" y2="83"/>
      <line class="grid" x1="14" y1="124" x2="586" y2="124"/>
      <line class="grid" x1="14" y1="165" x2="586" y2="165"/>
      <line class="grid" x1="14" y1="206" x2="586" y2="206"/>
      <line class="grid" x1="14" y1="247" x2="586" y2="247"/>
      <text class="header" x="24" y="68">Overview</text>
      <text class="header" x="416" y="68" text-anchor="end">30 laps | 4 stints | final 8</text>
      <text class="header" x="576" y="68" text-anchor="end">Advice</text>
      <text class="cell" x="24" y="109">Strategy</text>
      <text class="cell" x="416" y="109" text-anchor="end">8-lap rhythm avoids +1 stop</text>
      <text class="cell" x="576" y="109" text-anchor="end">~65s | save 0.1</text>
      <text class="cell" x="24" y="150">Stint 1</text>
      <text class="cell" x="416" y="150" text-anchor="end">7 laps | target -- L/lap</text>
      <text class="cell" x="576" y="150" text-anchor="end">tires +4s</text>
      <text class="cell" x="24" y="191">Stint 2</text>
      <text class="cell" x="416" y="191" text-anchor="end">8 laps | target 13.3 L/lap</text>
      <text class="cell" x="576" y="191" text-anchor="end">tires free (106 L)</text>
      <text class="cell" x="24" y="232">Stint 3</text>
      <text class="cell" x="416" y="232" text-anchor="end">7 laps | target 15.1 L/lap</text>
      <text class="cell" x="576" y="232" text-anchor="end">tires +4s</text>
      <text class="cell" x="24" y="273">Stint 4</text>
      <text class="cell" x="416" y="273" text-anchor="end">8 laps final | target 13.3 L/lap</text>
      <text class="cell" x="576" y="273" text-anchor="end">no tire stop</text>
      <text class="source" x="14" y="310">burn 13.4 L/lap (user history) | 7.9 laps/tank | history user | fuel scalar unavailable</text>
    </g>
  </g>
</svg>
