      <rect x="148" y="108" width="205" height="6" rx="3" fill="#213550"/>
      <rect x="148" y="108" width="172" height="6" rx="3" fill="url(#chrome)"/>
      <circle cx="320" cy="111" r="8" fill="#ffd15b"/>
